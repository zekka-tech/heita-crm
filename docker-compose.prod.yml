version: "3.9"

services:
  app:
    # Pull the pre-built, CI-tested image from GHCR. Never add a build: block
    # here — building on the VPS bypasses Trivy scanning and Cosign signing.
    image: ghcr.io/zekka-tech/heita-crm:${HEITA_IMAGE_TAG:-latest}
    container_name: heita_app
    restart: unless-stopped
    networks:
      # heita_internal: reach postgres/redis (isolated, no egress)
      # heita_edge: outbound internet (Anthropic, Meta, Africa's Talking, R2)
      #             and inbound from the caddy reverse proxy
      - heita_internal
      - heita_edge
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
    env_file:
      - .env.production
    # Bound to loopback only — never expose the app directly. Public traffic
    # arrives via the caddy service (TLS) or, if you front it with a host-level
    # Nginx/Caddy instead, that proxy connects to 127.0.0.1:3000.
    ports:
      - "127.0.0.1:3000:3000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # BullMQ background job worker. Runs from the same signed image as the app,
  # processing document ingestion, customer imports, web crawls, and follow-ups.
  # Requires both heita_internal (DB, Redis) and heita_edge (outbound calls).
  worker:
    image: ghcr.io/zekka-tech/heita-crm:${HEITA_IMAGE_TAG:-latest}
    container_name: heita_worker
    restart: unless-stopped
    networks:
      - heita_internal
      - heita_edge
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    command: ["node", "dist/worker.mjs"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # One-shot migration runner. The app's standalone runtime image has `prisma`
  # pruned (it is a devDependency), so migrations run from a clean Node image
  # with the prisma/ folder mounted. Not started by `up` — it lives behind the
  # `migrate` profile and is invoked explicitly by scripts/deploy.sh:
  #   docker compose -f docker-compose.prod.yml --profile migrate run --rm migrate
  migrate:
    image: node:22.12.0-alpine
    container_name: heita_migrate
    profiles:
      - migrate
    restart: "no"
    working_dir: /app
    networks:
      - heita_internal
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    volumes:
      - ./prisma:/app/prisma:ro
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    # The migrate service connects as the owner role so it can run DDL (CREATE
    # TABLE, ALTER, etc.). MIGRATION_DATABASE_URL overrides DATABASE_URL here so
    # that the app runtime (heita_app / NOBYPASSRLS) is never used for migrations.
    environment:
      DATABASE_URL: ${MIGRATION_DATABASE_URL:-${DATABASE_URL}}
    command: ["npx", "--yes", "prisma@7", "migrate", "deploy", "--schema=prisma/schema.prisma"]

  # TLS-terminating reverse proxy. Sits on heita_edge and forwards to app:3000.
  # Cloudflare proxies DNS in front of this; set CADDY_TLS_MODE to match your
  # Cloudflare SSL/TLS mode (see Caddyfile + docs/DEPLOYMENT.md).
  caddy:
    image: caddy:2-alpine
    container_name: heita_caddy
    restart: unless-stopped
    networks:
      - heita_edge
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env.production
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:exec
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Vector log shipper — tails json-file logs from the app container and
  # forwards structured JSON to the configured sink (Loki, Elasticsearch, etc).
  # Set VECTOR_SINK_* env vars in .env.production to activate shipping.
  # If no sink is configured Vector starts but forwards nothing (safe default).
  vector:
    image: timberio/vector:0.41.1-alpine
    container_name: heita_vector
    restart: unless-stopped
    networks:
      - heita_internal
    depends_on:
      - app
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/vector/vector.yaml:/etc/vector/vector.yaml:ro
    env_file:
      - .env.production
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Malware scanner for uploaded documents/logos. The app connects over
  # heita_internal; heita_edge gives FreshClam outbound access for signatures.
  clamav:
    image: clamav/clamav:stable
    container_name: heita_clamav
    restart: unless-stopped
    networks:
      - heita_internal
      - heita_edge
    volumes:
      - clamav_data:/var/lib/clamav
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping 1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512m
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  postgres:
    # Digest-pinned to a specific build. Re-pin via: bash scripts/pin-image-digests.sh
    image: pgvector/pgvector:pg16@sha256:00ba258a66dac104fd5171074a0084462a64a1369d8513f3d0a634e2f24d15bc
    container_name: heita_postgres
    restart: unless-stopped
    networks:
      - heita_internal
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-heita}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-heita}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-heita} -d ${POSTGRES_DB:-heita}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  redis:
    # Digest-pinned to a specific build. Re-pin via: bash scripts/pin-image-digests.sh
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: heita_redis
    restart: unless-stopped
    networks:
      - heita_internal
    volumes:
      - redis_data:/data
    # noeviction: BullMQ jobs and OTP codes must NEVER be silently dropped.
    # allkeys-lru is only appropriate for pure cache instances.
    command: >
      redis-server
      --appendonly yes
      --requirepass "${REDIS_PASSWORD:?required}"
      --maxmemory 384mb
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  postgres_data:
  redis_data:
  clamav_data:
  caddy_data:
  caddy_config:

networks:
  # Isolated data plane — postgres, redis, app, migrate, clamav. No route to
  # the internet, so the database and cache are unreachable from outside the host.
  heita_internal:
    driver: bridge
    internal: true
  # Edge plane — app + caddy. Provides the app's outbound internet access and
  # carries inbound proxied traffic. NOT internal.
  heita_edge:
    driver: bridge
