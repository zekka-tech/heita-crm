version: "3.9"

services:
  app:
    # Pull the pre-built, CI-tested image from GHCR. Never add a build: block
    # here — building on the VPS bypasses Trivy scanning and Cosign signing.
    image: ghcr.io/zekka-tech/heita-crm:latest
    container_name: heita_app
    restart: unless-stopped
    networks:
      - heita_internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    ports:
      - "3000:3000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Vector log shipper — tails json-file logs from the app container and
  # forwards structured JSON to the configured sink (Loki, Elasticsearch, etc).
  # Set VECTOR_SINK_* env vars in .env.production to activate shipping.
  # If no sink is configured Vector starts but forwards nothing (safe default).
  vector:
    image: timberio/vector:0.41.1-alpine
    container_name: heita_vector
    restart: unless-stopped
    networks:
      - heita_internal
    depends_on:
      - app
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/vector/vector.yaml:/etc/vector/vector.yaml:ro
    env_file:
      - .env.production
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    # Digest-pinned to a specific build. Re-pin via: bash scripts/pin-image-digests.sh
    image: pgvector/pgvector:pg16@sha256:00ba258a66dac104fd5171074a0084462a64a1369d8513f3d0a634e2f24d15bc
    container_name: heita_postgres
    restart: unless-stopped
    networks:
      - heita_internal
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-heita}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-heita}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-heita} -d ${POSTGRES_DB:-heita}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  redis:
    # Digest-pinned to a specific build. Re-pin via: bash scripts/pin-image-digests.sh
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: heita_redis
    restart: unless-stopped
    networks:
      - heita_internal
    volumes:
      - redis_data:/data
    # noeviction: BullMQ jobs and OTP codes must NEVER be silently dropped.
    # allkeys-lru is only appropriate for pure cache instances.
    command: >
      redis-server
      --appendonly yes
      --requirepass "${REDIS_PASSWORD:?required}"
      --maxmemory 384mb
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  postgres_data:
  redis_data:

networks:
  heita_internal:
    driver: bridge
    internal: true
