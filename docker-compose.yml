services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: heita_postgres
    environment:
      POSTGRES_DB: heita_dev
      POSTGRES_USER: heita
      POSTGRES_PASSWORD: heita_dev
    ports:
      - "5432:5432"
    volumes:
      - heita_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heita -d heita_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: heita_redis
    ports:
      - "6380:6379"
    volumes:
      - heita_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: heita_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - heita_minio_data:/data

  ollama:
    image: ollama/ollama:latest
    container_name: heita_ollama
    ports:
      - "11434:11434"
    volumes:
      - heita_ollama_data:/root/.ollama

volumes:
  heita_postgres_data:
  heita_redis_data:
  heita_minio_data:
  heita_ollama_data:

