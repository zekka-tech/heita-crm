groups:
  - name: heita_crm_critical
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(heita_http_requests_total{status=~"5.."}[5m]))
          /
          sum(rate(heita_http_requests_total[5m])) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "HTTP error rate > 1%"
          description: "{{ $value | humanizePercentage }} of requests are returning 5xx over the last 5 minutes."
          runbook_url: "docs/runbooks/high-error-rate.md"

      - alert: HighP99Latency
        expr: |
          histogram_quantile(0.99,
            sum(rate(heita_http_request_duration_seconds_bucket[5m])) by (le, route)
          ) > 0.5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "P99 latency > 500ms"
          description: "Route {{ $labels.route }} P99 is {{ $value | humanizeDuration }}."
          runbook_url: "docs/runbooks/high-p99-latency.md"

      - alert: DlqDepthCritical
        expr: heita_dlq_pending_jobs > 100
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Dead-letter queue depth > 100"
          description: "{{ $value }} jobs in DLQ — investigate worker failures immediately."
          runbook_url: "docs/runbooks/dlq-depth-critical.md"

  - name: heita_crm_security
    interval: 30s
    rules:
      - alert: OtpRequestSpike
        expr: rate(heita_otp_requests_total[5m]) > 2
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "OTP request rate spike"
          description: "{{ $value | humanize }} OTP requests/s — possible automated abuse or credential stuffing."
          runbook_url: "docs/runbooks/otp-request-spike.md"

      - alert: WebhookAuthFailureSpike
        expr: rate(heita_webhook_auth_failures_total[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Webhook auth failure rate elevated"
          description: "{{ $value | humanize }} auth failures/s on webhook {{ $labels.provider }} — possible replay or forged requests."
          runbook_url: "docs/runbooks/webhook-auth-failure-spike.md"

      - alert: RedisErrorSpike
        expr: rate(heita_redis_errors_total[5m]) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Redis error rate elevated"
          description: "{{ $value | humanize }} Redis errors/s — rate limiting and OTP delivery may be degraded."
          runbook_url: "docs/runbooks/redis-error-spike.md"

  - name: heita_crm_warning
    interval: 60s
    rules:
      - alert: ElevatedErrorRate
        expr: |
          sum(rate(heita_http_requests_total{status=~"5.."}[5m]))
          /
          sum(rate(heita_http_requests_total[5m])) > 0.005
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HTTP error rate > 0.5%"
          description: "{{ $value | humanizePercentage }} 5xx rate — trending up."
          runbook_url: "docs/runbooks/elevated-error-rate.md"

      - alert: AuthFailureSpike
        expr: rate(heita_auth_attempts_total{status="failure"}[5m]) > 10
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Auth failure rate elevated"
          description: "{{ $value | humanize }} failed auth attempts/s — possible credential stuffing."
          runbook_url: "docs/runbooks/auth-failure-spike.md"

      - alert: LoyaltyTransactionFailures
        expr: rate(heita_loyalty_events_total{type="error"}[5m]) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Loyalty transaction errors elevated"
          description: "{{ $value | humanize }} loyalty errors/s."
          runbook_url: "docs/runbooks/loyalty-transaction-failures.md"

      - alert: QueueJobFailures
        expr: rate(heita_queue_jobs_total{status="failed"}[10m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "BullMQ job failure rate elevated"
          description: "{{ $value | humanize }} failed jobs/s in queue {{ $labels.queue }}."
          runbook_url: "docs/runbooks/queue-job-failures.md"

      - alert: AiChatErrors
        expr: rate(heita_ai_chat_requests_total{status="error"}[10m]) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AI chat error rate elevated"
          description: "{{ $value | humanize }} AI errors/s — check Ollama/Anthropic availability."
          runbook_url: "docs/runbooks/ai-chat-errors.md"

      - alert: WebhookProcessingErrors
        expr: rate(heita_webhook_events_total{status="error"}[5m]) > 1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Webhook processing errors"
          description: "{{ $value | humanize }} webhook errors/s on {{ $labels.provider }}."
          runbook_url: "docs/runbooks/webhook-processing-errors.md"

  - name: heita_crm_availability
    interval: 60s
    rules:
      - alert: ServiceDown
        expr: up{job="heita-crm"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Heita CRM is down"
          description: "Prometheus cannot scrape the /api/metrics endpoint."
          runbook_url: "docs/runbooks/service-down.md"

      - alert: DlqDepthElevated
        expr: heita_dlq_pending_jobs > 10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Dead-letter queue depth elevated"
          description: "{{ $value }} jobs in DLQ for more than 10 minutes."
          runbook_url: "docs/runbooks/dlq-depth-elevated.md"

  # Multi-window, multi-burn-rate error-budget alerts — the enforcement layer for
  # the SLOs in docs/SLO.md §2. Each alert fires only when BOTH a long window and
  # a short confirmation window exceed the burn-rate threshold, which suppresses
  # flapping on transient blips. Budget basis: 30-day rolling window.
  #   burn_rate = error_ratio / (1 - SLO)   →   threshold = multiplier * (1 - SLO)
  #   14.4x over 1h  ≈ 2% of budget in 1h   → page
  #   6x   over 6h   ≈ 5% of budget in 6h   → ticket
  - name: heita_crm_slo_burn_rate
    interval: 30s
    rules:
      # ── A1 Availability (Tier 1) — SLO 99.9%, budget 0.001 ──────────────────
      - alert: ErrorBudgetBurnFast
        expr: |
          (
            sum(rate(heita_http_requests_total{status=~"5.."}[1h]))
            / sum(rate(heita_http_requests_total[1h]))
          ) > (14.4 * 0.001)
          and
          (
            sum(rate(heita_http_requests_total{status=~"5.."}[5m]))
            / sum(rate(heita_http_requests_total[5m]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          slo: availability
          action: page
        annotations:
          summary: "Fast error-budget burn (availability SLO)"
          description: "Burning the 99.9% availability budget at >14.4x (≈2% in 1h). At this rate the 30-day budget is gone in ~2 days. Page on-call."
          runbook_url: "docs/runbooks/error-budget-burn-fast.md"

      - alert: ErrorBudgetBurnSlow
        expr: |
          (
            sum(rate(heita_http_requests_total{status=~"5.."}[6h]))
            / sum(rate(heita_http_requests_total[6h]))
          ) > (6 * 0.001)
          and
          (
            sum(rate(heita_http_requests_total{status=~"5.."}[30m]))
            / sum(rate(heita_http_requests_total[30m]))
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          slo: availability
          action: ticket
        annotations:
          summary: "Slow error-budget burn (availability SLO)"
          description: "Burning the 99.9% availability budget at >6x (≈5% in 6h). Open a reliability ticket and pause non-critical releases per docs/SLO.md §2."
          runbook_url: "docs/runbooks/error-budget-burn-slow.md"

      # ── A6 Webhook ingestion (Tier 1) — SLO 99.9%, budget 0.001 ─────────────
      - alert: WebhookErrorBudgetBurnFast
        expr: |
          (
            sum by (provider) (rate(heita_webhook_events_total{status="error"}[1h]))
            / sum by (provider) (rate(heita_webhook_events_total[1h]))
          ) > (14.4 * 0.001)
          and
          (
            sum by (provider) (rate(heita_webhook_events_total{status="error"}[5m]))
            / sum by (provider) (rate(heita_webhook_events_total[5m]))
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          slo: webhook_ingestion
          action: page
        annotations:
          summary: "Fast error-budget burn (webhook ingestion SLO)"
          description: "Webhook {{ $labels.provider }} burning the 99.9% ingestion budget at >14.4x. Inbound WhatsApp/Africa's Talking events are being lost — page on-call."
          runbook_url: "docs/runbooks/webhook-error-budget-burn-fast.md"

      # ── A5 AI chat (Tier 2) — SLO 99.0%, budget 0.01 ───────────────────────
      - alert: AiChatErrorBudgetBurnSlow
        expr: |
          (
            sum(rate(heita_ai_chat_requests_total{status="error"}[6h]))
            / sum(rate(heita_ai_chat_requests_total[6h]))
          ) > (6 * 0.01)
          and
          (
            sum(rate(heita_ai_chat_requests_total{status="error"}[30m]))
            / sum(rate(heita_ai_chat_requests_total[30m]))
          ) > (6 * 0.01)
        for: 15m
        labels:
          severity: warning
          slo: ai_chat
          action: ticket
        annotations:
          summary: "Slow error-budget burn (AI chat SLO)"
          description: "AI chat burning the 99.0% budget at >6x even after Ollama→Anthropic fallback. Check both runtimes; open a ticket per docs/SLO.md §2."
          runbook_url: "docs/runbooks/ai-chat-error-budget-burn-slow.md"
