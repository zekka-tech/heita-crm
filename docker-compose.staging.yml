version: "3.9"

services:
  app:
    image: ${HEITA_IMAGE:-ghcr.io/zekka-tech/heita-crm:latest}
    container_name: heita_staging_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      ollama:
        condition: service_started
    env_file:
      - .env.staging
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-heita}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-heita}
      REDIS_URL: redis://:${REDIS_PASSWORD:?required}@redis:6379
      MINIO_ENDPOINT: http://minio:9000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health?deep=1"]
      interval: 30s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    container_name: heita_staging_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-heita}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-heita}
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-heita} -d ${POSTGRES_DB:-heita}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: heita_staging_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:?required}"
    volumes:
      - staging_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: heita_staging_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - staging_minio_data:/data

  ollama:
    image: ollama/ollama:latest
    container_name: heita_staging_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - staging_ollama_data:/root/.ollama

volumes:
  staging_postgres_data:
  staging_redis_data:
  staging_minio_data:
  staging_ollama_data:
