name: Database backup

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    name: pg_dump to object storage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.BACKUP_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.BACKUP_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.BACKUP_AWS_REGION }}

      - name: Run backup
        env:
          DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
          BACKUP_S3_URI: ${{ secrets.BACKUP_S3_URI }}
          BACKUP_PREFIX: heita-crm
        run: bash ./scripts/backup-postgres.sh

      - name: Enforce 30-day retention
        env:
          BACKUP_S3_URI: ${{ secrets.BACKUP_S3_URI }}
          BACKUP_AWS_REGION: ${{ secrets.BACKUP_AWS_REGION }}
        run: |
          # Parse bucket and prefix from S3 URI (s3://bucket/prefix)
          BUCKET=$(echo "$BACKUP_S3_URI" | sed 's|s3://||' | cut -d/ -f1)
          PREFIX=$(echo "$BACKUP_S3_URI" | sed 's|s3://[^/]*/||')
          CUTOFF=$(date -d "30 days ago" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -v -30d +%Y-%m-%dT%H:%M:%SZ)

          echo "Removing backups older than $CUTOFF from s3://$BUCKET/$PREFIX"

          aws s3api list-objects-v2 \
            --bucket "$BUCKET" \
            --prefix "$PREFIX" \
            --query "Contents[?LastModified<='$CUTOFF'].Key" \
            --output text | tr '\t' '\n' | grep -v '^$' | while read -r KEY; do
              echo "Deleting $KEY"
              aws s3 rm "s3://$BUCKET/$KEY"
          done

          echo "Retention cleanup complete."
