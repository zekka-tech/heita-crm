name: Preview image

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  preview:
    name: Build preview image
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute preview metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/heita-crm
          tags: |
            type=raw,value=pr-${{ github.event.pull_request.number }}
            type=sha,format=short,prefix=pr-${{ github.event.pull_request.number }}-

      - name: Build & push preview image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (preview)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/heita-crm:pr-${{ github.event.pull_request.number }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore

      - name: Publish staging compose artifact
        uses: actions/upload-artifact@v7
        with:
          name: heita-preview-compose
          path: |
            docker-compose.staging.yml
            OPERATIONS.md

      - name: Ephemeral smoke-test
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/heita-crm:pr-${{ github.event.pull_request.number }}
          HEITA_IMAGE=$IMAGE docker compose -f docker-compose.ephemeral.yml up -d

          # Wait for the app to become healthy (up to 3 min)
          for i in $(seq 1 36); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' heita_ephemeral_app 2>/dev/null || echo "starting")
            if [ "$STATUS" = "healthy" ]; then break; fi
            if [ "$STATUS" = "unhealthy" ] && [ "$i" -ge 5 ]; then
              echo "::group::App container logs (unhealthy)"
              docker logs --tail 80 heita_ephemeral_app 2>&1 || true
              echo "::endgroup::"
            fi
            echo "Waiting for app to become healthy (attempt $i/36, status=$STATUS)..."
            sleep 5
          done

          # Dump app logs before migrations so failures are diagnosable
          echo "::group::App container logs (pre-migration)"
          docker logs --tail 50 heita_ephemeral_app 2>&1 || true
          echo "::endgroup::"

          # Apply migrations
          docker exec heita_ephemeral_app npx prisma migrate deploy || true
          # Seed dev data
          docker exec heita_ephemeral_app node -e "
            const { execSync } = require('child_process');
            try { execSync('npx tsx prisma/seed.ts', { stdio: 'inherit' }); } catch {}
          " || true

          # Health check — /api/health/live is the liveness probe (no DB/Redis required)
          curl -fsS http://localhost:3001/api/health/live | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status') == 'ok', f'Health check failed: {d}'"

          docker compose -f docker-compose.ephemeral.yml down -v

      - name: Comment preview rollout instructions
        uses: actions/github-script@v9
        with:
          script: |
            const image = `ghcr.io/${context.repo.owner}/heita-crm:pr-${context.issue.number}`;
            const body = [
              "✅ Preview image published and ephemeral smoke-test passed.",
              "",
              `**Image:** \`${image}\``,
              "",
              "Roll out to staging with:",
              "```bash",
              `HEITA_IMAGE=${image} docker compose -f docker-compose.staging.yml up -d`,
              "```",
              "",
              "Ephemeral test environment with seeded data:",
              "```bash",
              `HEITA_IMAGE=${image} docker compose -f docker-compose.ephemeral.yml up -d`,
              "# App runs at http://localhost:3001",
              "# Tear down: docker compose -f docker-compose.ephemeral.yml down -v",
              "```"
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
