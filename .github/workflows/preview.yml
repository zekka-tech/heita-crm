name: Preview image

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  preview:
    name: Build preview image
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute preview metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/heita-crm
          tags: |
            type=raw,value=pr-${{ github.event.pull_request.number }}
            type=sha,format=short,prefix=pr-${{ github.event.pull_request.number }}-

      - name: Build & push preview image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish staging compose artifact
        uses: actions/upload-artifact@v4
        with:
          name: heita-preview-compose
          path: |
            docker-compose.staging.yml
            OPERATIONS.md

      - name: Comment preview rollout instructions
        uses: actions/github-script@v7
        with:
          script: |
            const image = `ghcr.io/${context.repo.owner}/heita-crm:pr-${context.issue.number}`;
            const body = [
              "Preview image published.",
              "",
              `Image: \`${image}\``,
              "",
              "Roll out to staging with:",
              "```bash",
              `HEITA_IMAGE=${image} docker compose -f docker-compose.staging.yml up -d`,
              "```"
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
