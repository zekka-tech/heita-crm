name: Build & publish image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  image:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/heita-crm
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/heita-crm@${{ steps.build.outputs.digest }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign published image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/heita-crm@${{ steps.build.outputs.digest }}

  staging:
    name: Deploy to staging & smoke test
    runs-on: ubuntu-latest
    needs: image
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/heita
            docker compose -f docker-compose.staging.yml pull app
            docker compose -f docker-compose.staging.yml up -d --no-deps app
            # Wait for readiness (up to 60s)
            for i in $(seq 1 12); do
              STATUS=$(docker compose -f docker-compose.staging.yml exec -T app wget -qO- http://localhost:3000/api/health/live 2>/dev/null || echo "down")
              if echo "$STATUS" | grep -q '"status":"ok"'; then
                echo "App is live"; break
              fi
              echo "Waiting... ($i/12)"; sleep 5
            done

      - name: Smoke test — liveness probe
        run: |
          curl -f --max-time 10 "${{ secrets.STAGING_APP_URL }}/api/health/live" | \
            grep -q '"status":"ok"' && echo "Live OK"

      - name: Smoke test — deep readiness probe
        run: |
          curl -f --max-time 15 "${{ secrets.STAGING_APP_URL }}/api/health/ready" | \
            grep -q '"status"' && echo "Readiness OK"

      - name: Smoke test — landing page reachable
        run: |
          HTTP=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "${{ secrets.STAGING_APP_URL }}/")
          [ "$HTTP" = "200" ] && echo "Landing OK" || (echo "Landing returned $HTTP"; exit 1)
