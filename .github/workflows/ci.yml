name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22.11.0"

permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    name: Lint · Typecheck · Unit tests · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: heita
          POSTGRES_PASSWORD: heita
          POSTGRES_DB: heita
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U heita -d heita"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      AUTH_SECRET: "ci-only-secret"
      DATABASE_URL: "postgresql://heita:heita@localhost:5432/heita"
      NODE_ENV: "production"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Migration drift check
        run: npx prisma migrate diff --from-config-datasource --to-schema prisma/schema.prisma --exit-code

      - name: Destructive migration safety gate
        if: github.event_name == 'pull_request'
        env:
          SHADOW_DATABASE_URL: "postgresql://heita:heita@localhost:5432/heita_shadow"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create a shadow DB for diff
          PGPASSWORD=heita psql -h localhost -U heita -d heita -c "CREATE DATABASE heita_shadow;" 2>/dev/null || true

          # Generate SQL diff: what the PR migration adds vs the currently deployed schema
          DIFF=$(npx prisma migrate diff \
            --from-schema-datasource prisma/schema.prisma \
            --to-migrations prisma/migrations \
            --shadow-database-url "$SHADOW_DATABASE_URL" \
            --script 2>/dev/null || true)

          # Detect destructive operations
          if echo "$DIFF" | grep -qiE "^(DROP TABLE|DROP COLUMN|ALTER TABLE .* DROP|ALTER TABLE .* RENAME|ALTER TABLE .* ALTER COLUMN .* TYPE)"; then
            echo "::warning::Destructive migration detected. Checking for 'migration-approved' label..."
            LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
            if echo "$LABELS" | grep -q "migration-approved"; then
              echo "::notice::Label 'migration-approved' found — allowing destructive migration."
            else
              echo "::error::This PR contains destructive SQL (DROP/ALTER COLUMN). Add the 'migration-approved' label after a manual DBA review to unblock."
              echo "$DIFF"
              exit 1
            fi
          else
            echo "No destructive operations detected."
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage enforcement
        run: npm run test:coverage

      - name: Accessibility smoke tests (axe-core, WCAG AA)
        run: npm run test:a11y

      - name: Build
        run: npm run build

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: heita
          POSTGRES_PASSWORD: heita
          POSTGRES_DB: heita
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U heita -d heita"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      AUTH_SECRET: "ci-only-secret"
      DATABASE_URL: "postgresql://heita:heita@localhost:5432/heita"
      REDIS_URL: "redis://localhost:6379"
      NODE_ENV: "test"
      # Dev OTP mode so Playwright can read OTP from the page
      AUTH_DEV_OTP: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Prisma generate + migrate
        run: npx prisma generate && npx prisma migrate deploy

      - name: Build for E2E
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  security:
    name: Audit & secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: npm audit (production only, high)
        run: npm audit --omit=dev --audit-level=high

      - name: Trivy filesystem scan (fail on critical)
        uses: aquasecurity/trivy-action@0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Generate CycloneDX SBOM
        uses: CycloneDX/gh-node-module-generatebom@v1
        with:
          path: .
          output: bom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: heita-crm-cyclonedx-sbom
          path: bom.json

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
